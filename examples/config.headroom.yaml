server:
  host: 0.0.0.0
  port: 8000

provider:
  name: headroom
  base_url: https://api.openai.com/v1
  api_key_env: OPENAI_API_KEY
  timeout_seconds: 120
  headroom:
    enabled: true

audit:
  type: jsonl
  path: /data/audit.jsonl

detectors:
  regex_secrets:
    enabled: true
  gitleaks:
    enabled: true
    timeout_seconds: 3
  regex_pii:
    enabled: true

limits:
  max_request_bytes: [REDACTED:PHONE]
  max_response_bytes: [REDACTED:PHONE]
  max_scan_chars: 200000

policy:
  default_action: allow
  rules:
    openai_key: block
    github_token: block
    aws_access_key: block
    aws_secret: block
    anthropic_key: block
    deepseek_key: block
    slack_token: block
    secret: block
    email: mask
    phone: mask
