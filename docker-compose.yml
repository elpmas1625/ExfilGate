services:
  firewall:
    build: .
    ports:
      - "8000:8000"
    environment:
      AICF_CONFIG: ${AICF_CONFIG:-/app/examples/config.yaml}
      AICF_AUDIT_PATH: ${AICF_AUDIT_PATH:-/data/audit.jsonl}
      AICF_PROVIDER_BASE_URL: ${AICF_PROVIDER_BASE_URL:-}
      AICF_PROVIDER_API_KEY: ${AICF_PROVIDER_API_KEY:-}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
    volumes:
      - ./examples:/app/examples:ro
      - aicf_data:/data

  headroom:
    image: ghcr.io/headroom-ai/headroom:latest
    ports:
      - "8787:8787"
    profiles:
      - headroom
      - all
    environment:
      HEADROOM_BACKEND: anthropic
      HEADROOM_LOG_FILE: /data/proxy.jsonl
      HEADROOM_PORT: 8787
      HEADROOM_HOST: 0.0.0.0
      ANTHROPIC_API_KEY: ${HEADROOM_ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${HEADROOM_OPENAI_API_KEY:-}
    volumes:
      - headroom_data:/data

  redis:
    image: redis:7-alpine
    profiles:
      - optional

volumes:
  aicf_data:
  headroom_data:
